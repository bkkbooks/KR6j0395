  - {type: variant, offset: 4418, length: 129, content: '文殊師利忿怒陀羅尼

      「唵嚩日囉二合底乞叉拏三合俱嚕二合馱瞋那瞋那吽引泮吒」

      用此真言護身、辟除、結界、淨諸香花及一切供具等並得。

      當願眾生遇此教，曼殊常為善知識，

      速證般若善巧智，疾成無上兩足尊。

      五字陀羅尼

      阿囉跛者曩唵嚩日囉二合底乞叉拏三合唵耨佉泚去娜唵渴誐蘖囉二合欠平唵渴誐薩怛嚩二合', 乙: ''}
