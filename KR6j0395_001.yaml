body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯爾時文殊師利菩薩在毗盧遮那大會中從座而起頂禮佛足白佛言世尊我今説本五字陀羅尼若有善男子善女人才誦一遍者一切如來所説法義修多羅藏讀誦受持等彼功德毗盧遮那佛告文殊師利言隨意説之爾時文殊師利即説明曰阿囉跛者曩才説此陀羅尼一切如來所説法攝入五字陀羅尼中能令衆生般若波羅蜜多成就我今當説曼荼羅法或十四日十五日選擇極清淨處作曼茶羅以瞿摩夷塗地復以白檀香泥塗之隨意大小於曼荼羅中畫文殊師利五髻童子形狀身如鬱金色種種瓔珞莊嚴其身右手把金剛劍左手把梵夾坐於月輪中於月輪四面周旋書五字陀羅尼阿闍梨對於此壇結金剛劍印念誦時文殊師利加持此阿闍梨即得無礙辨才仍為現身一一解釋此陀羅尼甚深義理時阿闍梨即當禮拜出道場外為弟子受菩薩戒即以緋帛覆眼引入壇場門次而立時阿闍梨告弟子言汝今獲一切如來般若波羅蜜自今已後不應向人而説此明勿令破汝三摩耶法此陀羅尼極應祕密阿囉跛者曩者是滿一切願義何以故阿字者樂欲菩提義囉字者深著不捨衆生義跛字者第一義諦義者字者妙行義曩字者無自性義樂欲菩提不捨衆生深入第一義諦中行行修習諸法無有自性若如是修滿一切願此諸願中證如來位及執金剛不求當得我今又説契印曼茶羅壇中畫金剛劍四面各於本方畫八供養契及四攝契對於此壇念誦不久即當成就我今又説三摩耶曼荼羅壇中書五字及八供養四攝種子字對此壇念誦而作是言阿字門者諸法本不生日日念誦不久一切罪障消滅速得成就我今又説羯磨曼荼羅壇中安般若波羅蜜經卷日日讀誦念誦以種種供養而供養之不久即當成就我今當説畫像法或白㲲絹素等中畫文殊師利菩薩坐月輪中輪內周旋書五字四面畫八供養及四攝如大壇法對此像前如法念誦而作是言諸法自性成就念誦數滿五十萬遍即獲無盡辨才如文殊師利菩薩等無有異飛騰虛空所求世間出世間事悉得成就又念誦數滿一俱胝離諸苦惱滿二俱胝遍五無間等一切罪障永盡無餘三俱胝遍證悟一切諸三昧門四俱胝遍獲大聞持五俱胝遍成阿耨多羅三藐三菩提又法於舍利塔四面周旋右轉書五字陀羅尼繞塔行道念誦勿令斷絶滿五落叉遍爾時如來及文殊師利執金剛等於虛空中而現其身仍為説法金剛頂經瑜伽文殊師利菩薩儀軌供養法一品歸命童真妙吉祥我依瑜伽説念誦身口意業金剛念如來甚深三密門行者應發普賢心從師應受金剛戒不顧身命起慈悲方可堪入解脫輪應從師受三麼耶契印密語如經説敬阿闍梨如佛想於同學所殷重心或於山間阿蘭若流泉浴池悅意樹山峯石窟逈樹邊建立壇場如本法莊嚴精室置本尊隨力供養一心住遍觀十方諸佛海供養禮諸如來足為成三業金剛故當於二手舌心中應想五智金剛杵由此加持皆悉地次應結契名警覺二手皆作金剛拳檀慧相鉤竪進力二度側拄成覺悟警覺真言曰唵嚩日囉二合底瑟姹二合敬禮東方阿閦尊捨身求請不退轉全身著地以心禮金剛合掌舒頂上捨身求請加持真言曰唵薩嚩怛他蘖多一布引儒跛娑他二合引囊引耶引答麼二合引南二涅哩夜二合引多夜彌三薩嚩怛他引蘖多四嚩日囉二合薩怛嚩二合地瑟姹二合娑嚩二合𤚥心想吽字青色次當敬禮寶生尊捨身求請灌頂位金剛合掌當於心以額著地虔誠禮捨身求請灌頂真言曰唵薩嚩怛他蘖多布惹毗曬迦引耶引答麼二合南涅哩夜二合多夜彌薩嚩怛他引蘖多嚩日囉二合囉怛那二合毗詵左𤚥額想黃色次禮觀自在王尊捨身求請三麼地金剛合掌置頂上以口著地虔誠禮捨身求請三昧真言曰唵薩嚩怛他引蘖多布惹鉢囉二合靺多囊引答麼二合南涅哩夜二合多夜彌薩嚩怛他引蘖多嚩日囉二合達麼鉢囉二合靺多野𤚥口想赤次禮不空成就尊捨身求請善巧智金剛合掌安於心以頂著地稽首禮捨身求請方便真言曰唵薩嚩怛他蘖多布惹羯麼抳阿答麼二合南涅哩夜二合多夜彌薩嚩怛他蘖多嚩日囉二合羯麼句嚕𤚥頂想緑次復敬禮十方佛想身遍在諸佛前觀想五輪著地禮當結金剛三麼耶遍禮十方真言曰唵薩嚩怛他引蘖多迦耶弭嚩引枳質二合多嚩日囉二合鉢囉二合弩梅嚩日囉二合滿娜南迦嚕弭唵嚩日囉二合勿微吉反次誦成就妙真言所有衆生求勝事願諸如來悉加持速令成就無上道成熟一切衆生真言曰唵薩嚩怛他去引蘖多餉悉鐸當各反薩嚩薩怛嚩二合南薩嚩悉馱藥三鉢睍擔怛他引蘖多室者二合地底丁以反瑟姹二合擔次當結跏端身坐淨除三業令清淨諸法本性清淨故令我此身淨無垢淨三業真言曰唵娑嚩二合婆引嚩舜入聲馱引薩嚩達麼引娑嚩二合婆嚩舜入聲度㟏次金剛合掌十度初分交誦此真言曰唵嚩日囉二合引惹里深交諸度拳已成金剛縛誦此真言曰唵嚩日囉二合滿馱次當開心入佛智當於二乳想兩字怛囉吒字皆白色其字想為二戶扇二手當結金剛縛三拍當心開門戶開心真言曰唵嚩日囉二合滿馱怛囉二合吒半音當觀妙蓮阿字門以印召入於心殿定慧為月金剛縛禪智在掌想字入金剛入字真言曰唵嚩日囉二合吠舍惡次當結閉心戶印如前入印之幖幟進力屈在禪智上即得堅固不退轉金剛拳真言曰唵嚩日囉二合母瑟知二合𤚥次結文殊三麼耶十度相叉成滿月直申忍願金剛劍想身同等妙吉祥三麼耶真言曰唵嚩日囉二合底丁以反引乞叉儜三合三麼耶娑怛鑁二合次當結喜三昧印定慧為月堅固縛忍辱願度中交合檀慧禪智竪相著真言曰奄三麼耶穀引蘇囉多娑怛鑁三合次結金剛降三世想身同彼無差別止觀二羽金剛拳檀慧相鉤竪進力左轉辟除右結界悲心示現威怒形降三世真言曰唵遜婆儞遜婆儞去吽短仡哩二合釁拏二合吃哩二合釁拏二合吽短仡哩二合釁拏二合跛耶吽短阿囊耶斛引婆誐鑁嚩日囉二合吽短泮吒半音次結蓮花三麼耶為令觀行成就故十度相叉作為月禪智檀慧竪相著真言曰唵嚩日囉二合跛娜麼二合三麼耶娑怛鑁三合行者應修阿薩頗那伽法修此法者不動支節止出入息令其微細勿使散亂即應觀於虛空一切諸佛由如胡麻遍滿十方以金剛彈指告行者言善男子汝觀本心行者聞已即想自身禮諸佛足禮畢諦觀本心白諸佛言心相無體云何修證諸佛告行者言善男子汝觀心中月輪如在輕霧即誦瑩徹菩提真言諦觀心月真言曰唵質多鉢囉二合底丁以反吠鄧迦嚕彌行者應了了諦觀不久當見清淨菩提心離諸塵垢淨如滿月即誦菩提心真言曰唵冒地質多母怛跛二合引那夜引彌想菩提月中有曇字如金色輝曜如日放大光明便即變成般若波羅蜜劍離諸分別能斷煩惱想為智劍真言曰唵底瑟姹二合渴誐想其智劍漸漸增大遍周法界真言曰唵娑頗二合囉渴誐想其智劍漸漸收攝等自身量真言曰唵僧賀囉渴誐為令智劍堅固不散復誦真言曰唵涅哩二合荼底瑟姹二合渴誐想空中如來盡入智劍同為一體作是思惟如彼諸佛體性我亦同然真言曰唵三麼喻引含摩訶引三摩喻引含薩嚩怛他蘖多鼻二去引地渴誐怛麼二合句引含想其智劍漸漸變成文殊師利童真菩薩具大威德身著種種瓔珞頂想五髻右手持智劍左手執青蓮花花上有般若波羅蜜經夾身色如鬱金心誦阿囉跛者曩一遍次結金剛智劍印止觀相叉作滿月忍願皆竪如劍形印心及額喉頂上即成護身堅本尊真言曰唵嚩日囉二合底乞叉拏三合地瑟姹二合娑嚩二合𤚥次當灌頂結寶印二手相叉作為月進力反屈如寶形禪智二度下相捻置於額上分兩邊便結智拳如繫帛兩手向前徐徐散當知已繫無垢繒真言曰唵嚩日囉二合囉怛曩二合莽隸鼻曬計囉鼻詵者娑嚩二合𤚥薩嚩母捺囉二合冥涅哩二合雉句嚕嚩囉迦嚩制娜鑁次結寶劍自灌頂二手合掌屈進力禪智皆屈入掌中置於額上分兩邊灌頂真言曰唵囉怛曩二合俱舍仡哩耶三合吽引次復結於甲胄印二手皆作金剛拳置於心前竪進力左右二度想唵砧想流清光為緑色心前三轉繞背後復至臍下及兩膝又轉至臍繞腰後從腰到心轉兩膊從膊至喉向頸後復從頸後至額前從額至腦結智拳徐徐散下如垂帶上觀旋轉如舞勢二手相叉成滿月甲胄真言曰唵嚩日囉二合迦嚩左嚩日𠼝二合句嚕嚩日囉二合嚩日囉二合娜含次陳金剛拍掌儀二羽齊拍一相拍由陳拍印真言并能令聖衆發歡喜速獲本尊堅固體歡喜真言曰唵嚩日囉二合底引乞叉拏三合覩使野二合斛引次當行者座前觀八葉蓮花具鬚蘂上觀師子妙高座座上復有七寶樓中想七寶蓮花王上想曇字具威光遍照法界靡不周其字變為金剛利了了諦觀如本形召請菩薩入想身二手作月進如鉤想身同於彼菩薩金剛鉤菩薩真言曰唵阿夜引呬弱次當結索入尊身結月禪押智入掌由此密印加持故變為一體無有差金剛索真言曰唵阿呬吽吽次當鎖印令堅固作月四度猶如環由此祕印威力故悉令堅固而不變金剛鎖真言曰唵係娑普二合吒鑁次結鈴印令歡喜禪智八掌如鈴鐸令尊及衆皆歡喜加持令速妙成就金剛鈴真言曰唵健吒噁噁行者次當兩手捧遏伽想洗金剛利菩薩及諸眷屬足或以百字真言加持遏伽而獻遏伽真言曰唵嚩日盧二合娜迦吽引次結曼殊羯磨印二羽皆作金剛拳禪羽置於自心上右手猶如執劍勢由此羯麼妙印力身獲如尊等無異羯麼真言曰唵嚩日囉二合底乞叉拏三合曇次結金剛利劍印結月忍願申如劍由此金剛利妙印當獲般若甚深智金剛利真言曰唵耨佉泚娜次復當結內供養結月當心竪禪智由結金剛嬉戲印速滿檀那波羅蜜金剛嬉戲真言曰唵摩訶囉底次結金剛鬘供養依前嬉戲直申臂由結此印加持故當滿淨戒波羅密金剛鬘真言曰唵嚕跛戍引鞞次結金剛歌詠印鬘至臍口垂下散由結金剛歌密印速獲安忍波羅蜜金剛歌真言曰唵戍嚕二合怛囉二合掃磎次結金剛舞供養二手拳旋如舞勢由結舞印加持故速滿精進波羅蜜金剛舞印真言曰唵薩嚩布爾次結金剛外供養二手作月向下散由結燒香印力故當證靜慮波羅蜜金剛燒香真言曰唵鉢囉二合賀攞二合儞引寧上次結金剛散花印結月向上如散花由此散花印加持速證般若波羅蜜金剛散花真言曰唵頗攞引誐銘次結金剛燈明印作月禪智頭相著由結金剛燈明印當得方便波羅蜜金剛燈明真言曰奄蘇帝惹引蘖哩二合次結金剛塗香印月當胸散如塗香由結塗香印加持速滿誓願波羅蜜金剛塗香真言曰唵蘇健蕩倪倪以兮反行者次應誦一百八名讚供養本尊又結金剛利劍印於心上誦百字真言加持自身假使過去世中造種種惡業五無間等一切罪障由此百字真言加持故一切罪障悉皆消滅見身獲得首楞嚴三昧若心散亂數誦此明或一七三七乃至七七一百八遍心離攀緣速得三摩地百字真言唵渴誐薩怛嚩二合一三麼耶麼努播引攞耶二合二渴誐薩怛嚩二合三底吠二合怒跛底瑟姹二合四涅哩二合住茶護反銘婆去嚩五素覩使喻二合銘婆去嚩六阿上拏囉訖覩二合銘婆去嚩七素布使喻二合引銘婆去嚩八薩嚩悉朕提飲反銘鉢囉二合也瑳九薩嚩羯磨素者銘十質多失唎二合藥句嚕十一吽引訶訶訶訶斛引婆誐鑁十二薩嚩怛他蘖多十三渴誐麼銘門上者十四渴倪倪以反婆嚩十五摩訶三摩耶薩怛嚩二合惡引十六不散前印諦觀前有本尊及想自身如本尊無異了了諦觀即誦五字陀羅尼或以金剛語誦或分明蓮華語誦或誦七遍三七遍以印於頂上解散次即把念珠當心念誦不緩不急或一百八遍或一千乃至一萬遍念誦數畢二手捧珠安於頂上然後置本處若三摩地念誦者當心觀大圓鏡智中布五字門了了諦觀隨義相應心與般若波羅蜜合此名三摩地念誦若身疲懈即結本尊劍印誦五字陀羅尼七遍復以八大供養供養諸佛以妙音辭稱揚讚歎獻閼伽水以降三世印左旋解界即結金剛利劍印奉送諸聖各還本宮真言曰唵訖哩二合覩引嚩無莫反一薩嚩薩怛嚩二合囉他二合二悉地捺多引三也他引努誐引上四蘖縒持挽二合沒馱尾灑焰五布曩囉引誐六麼囊引也都七唵渴誐薩怛嚩二合目八作此法已重以三麼耶印誦加持明以印四處然後灌頂被金剛甲胄依前四禮禮四方佛懺悔發願等然後依間靜處嚴以香花住本尊三摩地讀誦方廣一切大乘經典大般若大品乃至文殊般若等隨意經行若有智者依此法晝夜四時精進修見世證得歡喜地後十六生成正覺文殊師利忿怒陀羅尼唵嚩日囉二合底乞叉拏三合俱嚕二合馱瞋那瞋那吽引泮吒用此真言護身辟除結界淨諸香花及一切供具等並得當願衆生遇此教曼殊常為善知識速證般若善巧智疾成無上兩足尊五字陀羅尼阿囉跛者曩唵嚩日囉二合底乞叉拏三合唵耨佉泚去娜唵渴誐蘖囉二合欠平唵渴誐薩怛嚩二合
